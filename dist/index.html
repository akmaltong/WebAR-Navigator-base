<!DOCTYPE html>
<html lang="ru">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#000000" />
  <title>AR Navigator — ФЭСТУ</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    *,
    *::before,
    *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --green: #00ff88;
      --green2: #00cc6a;
      --blue: #4488ff;
      --red: #ff4466;
      --glass: rgba(8, 14, 26, .9);
      --border: rgba(255, 255, 255, .09);
      --t: .25s cubic-bezier(.4, 0, .2, 1);
    }

    body {
      font-family: 'Inter', sans-serif;
      overflow: hidden;
      background: #000;
      color: #fff;
      -webkit-font-smoothing: antialiased;
    }

    #ar-container {
      position: fixed;
      inset: 0;
      z-index: 1;
    }

    /* Top bar */
    #top-bar {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 200;
      padding: 14px 18px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: linear-gradient(to bottom, rgba(0, 0, 0, .75), transparent);
    }

    .logo {
      font-size: 17px;
      font-weight: 800;
      letter-spacing: -.5px;
    }

    .logo span {
      color: var(--green);
    }

    #ar-badge {
      display: none;
      align-items: center;
      gap: 6px;
      background: rgba(0, 255, 136, .12);
      border: 1px solid rgba(0, 255, 136, .35);
      padding: 5px 13px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 600;
      color: var(--green);
    }

    #ar-badge.on {
      display: flex;
    }

    .bdot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--green);
      animation: blink 1.6s ease-in-out infinite;
    }

    @keyframes blink {

      0%,
      100% {
        opacity: 1
      }

      50% {
        opacity: .3
      }
    }

    /* AR Entry overlay */
    #ar-entry {
      position: fixed;
      inset: 0;
      z-index: 150;
      display: none;
      align-items: flex-end;
      padding-bottom: 50px;
      justify-content: center;
      background: rgba(0, 0, 0, .55);
      backdrop-filter: blur(6px);
    }

    #ar-entry.on {
      display: flex;
    }

    .entry-card {
      background: var(--glass);
      border: 1px solid var(--border);
      border-radius: 28px;
      padding: 40px 44px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 22px;
      box-shadow: 0 32px 80px rgba(0, 0, 0, .7);
      max-width: 310px;
      text-align: center;
    }

    .entry-icon {
      width: 90px;
      height: 90px;
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .entry-icon::before,
    .entry-icon::after {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: 50%;
      border: 2px solid var(--green);
      animation: ripple 2.4s ease-out infinite;
    }

    .entry-icon::after {
      animation-delay: 1.2s;
    }

    @keyframes ripple {
      0% {
        transform: scale(.55);
        opacity: .9
      }

      100% {
        transform: scale(1.55);
        opacity: 0
      }
    }

    .entry-emoji {
      font-size: 38px;
    }

    .entry-title {
      font-size: 20px;
      font-weight: 700;
    }

    .entry-desc {
      font-size: 13px;
      color: rgba(255, 255, 255, .5);
      line-height: 1.6;
    }

    .btn-enter {
      padding: 14px 34px;
      border: none;
      border-radius: 50px;
      background: linear-gradient(135deg, var(--green), var(--green2));
      color: #000;
      font-size: 15px;
      font-weight: 700;
      font-family: inherit;
      cursor: pointer;
      transition: var(--t);
      box-shadow: 0 6px 20px rgba(0, 255, 136, .35);
    }

    .btn-enter:hover {
      transform: translateY(-2px);
    }

    .btn-enter:active {
      transform: scale(.97);
    }

    /* Step guide */
    #step-guide {
      position: fixed;
      top: 66px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 110;
      display: none;
      align-items: center;
      gap: 8px;
      background: var(--glass);
      border: 1px solid var(--border);
      border-radius: 50px;
      padding: 8px 18px;
      backdrop-filter: blur(20px);
      white-space: nowrap;
      font-size: 13px;
      font-weight: 600;
      box-shadow: 0 6px 24px rgba(0, 0, 0, .5);
    }

    #step-guide.on {
      display: flex;
    }

    /* Bottom panel */
    #ui-overlay {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      z-index: 100;
      padding: 14px;
      padding-bottom: calc(14px + env(safe-area-inset-bottom, 0px));
    }

    .panel {
      background: var(--glass);
      border: 1px solid var(--border);
      border-radius: 22px;
      padding: 16px;
      backdrop-filter: blur(30px);
      box-shadow: 0 -8px 40px rgba(0, 0, 0, .5);
    }

    /* Waypoint counter strip */
    .wp-strip {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 14px;
    }

    .wp-count-badge {
      background: rgba(0, 255, 136, .12);
      border: 1px solid rgba(0, 255, 136, .3);
      border-radius: 20px;
      padding: 5px 14px;
      font-size: 12px;
      font-weight: 700;
      color: var(--green);
    }

    .wp-dots {
      display: flex;
      gap: 6px;
      flex: 1;
      overflow: hidden;
    }

    .wp-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      flex-shrink: 0;
      transition: var(--t);
    }

    .wp-dot.start {
      background: var(--green);
    }

    .wp-dot.mid {
      background: var(--blue);
    }

    .wp-dot.end {
      background: #ff8800;
    }

    /* Buttons */
    .actions {
      display: flex;
      gap: 9px;
    }

    .btn {
      flex: 1;
      padding: 14px;
      border: none;
      border-radius: 14px;
      font-size: 14px;
      font-weight: 700;
      font-family: inherit;
      cursor: pointer;
      transition: var(--t);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 7px;
    }

    .btn-add {
      background: linear-gradient(135deg, var(--green), var(--green2));
      color: #000;
      box-shadow: 0 4px 16px rgba(0, 255, 136, .3);
    }

    .btn-add:hover {
      transform: translateY(-2px);
    }

    .btn-route {
      background: linear-gradient(135deg, #ff8800, #ff5500);
      color: #fff;
      box-shadow: 0 4px 16px rgba(255, 136, 0, .3);
    }

    .btn-route:hover {
      transform: translateY(-2px);
    }

    .btn-reset {
      width: 46px;
      flex: none;
      padding: 0;
      border-radius: 14px;
      background: rgba(255, 255, 255, .07);
      border: 1.5px solid rgba(255, 255, 255, .1);
      color: rgba(255, 255, 255, .6);
      font-size: 18px;
    }

    .btn-reset:hover {
      background: rgba(255, 68, 68, .15);
      color: var(--red);
    }

    .btn:active {
      transform: scale(.97);
    }

    .btn:disabled {
      opacity: .35;
      cursor: not-allowed;
      transform: none !important;
    }

    /* Status */
    #status {
      display: none;
      align-items: center;
      gap: 9px;
      margin-top: 12px;
      padding: 10px 14px;
      border-radius: 12px;
      font-size: 13px;
      font-weight: 500;
      line-height: 1.4;
      border: 1px solid transparent;
      animation: fadein .25s ease;
    }

    @keyframes fadein {
      from {
        opacity: 0;
        transform: translateY(6px)
      }

      to {
        opacity: 1;
        transform: none
      }
    }

    #status.on {
      display: flex;
    }

    #status.info {
      background: rgba(255, 255, 255, .05);
      border-color: rgba(255, 255, 255, .1);
      color: rgba(255, 255, 255, .6);
    }

    #status.success {
      background: rgba(0, 255, 136, .08);
      border-color: rgba(0, 255, 136, .25);
      color: var(--green);
    }

    #status.error {
      background: rgba(255, 68, 68, .08);
      border-color: rgba(255, 68, 68, .25);
      color: var(--red);
    }

    /* Loading */
    #loading-screen {
      position: fixed;
      inset: 0;
      z-index: 500;
      background: #070c14;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 26px;
      transition: opacity .5s ease, visibility .5s;
    }

    #loading-screen.hidden {
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
    }

    .load-brand {
      font-size: 30px;
      font-weight: 800;
      letter-spacing: -1px;
    }

    .load-brand span {
      color: var(--green);
    }

    .load-track {
      width: 180px;
      height: 3px;
      background: rgba(255, 255, 255, .1);
      border-radius: 2px;
      overflow: hidden;
    }

    .load-bar {
      height: 100%;
      background: linear-gradient(90deg, var(--green), var(--green2));
      animation: lbar 1.6s ease forwards;
    }

    @keyframes lbar {
      0% {
        width: 0
      }

      60% {
        width: 75%
      }

      100% {
        width: 100%
      }
    }

    .load-hint {
      font-size: 13px;
      color: rgba(255, 255, 255, .4);
    }
  </style>
  <script type="module" crossorigin src="/assets/index-CRY96zJr.js"></script>
</head>

<body>

  <div id="loading-screen">
    <div class="load-brand">AR<span>Nav</span></div>
    <div class="load-track">
      <div class="load-bar"></div>
    </div>
    <div class="load-hint">Инициализация…</div>
  </div>

  <div id="ar-container"></div>

  <div id="top-bar">
    <div class="logo">AR<span>Nav</span></div>
    <div id="ar-badge">
      <div class="bdot"></div>AR активен
    </div>
  </div>

  <div id="ar-entry" class="on">
    <div class="entry-card">
      <div class="entry-icon">
        <div class="entry-emoji">🥽</div>
      </div>
      <div class="entry-title">Навигация в AR</div>
      <div class="entry-desc">Войдите в AR, направьте камеру на пол, расставьте точки маршрута</div>
      <button id="btn-enter-ar" class="btn-enter">Запустить AR</button>
    </div>
  </div>

  <div id="step-guide">
    <span id="step-icon">📍</span>
    <span id="step-text">Направь камеру на пол и нажми «Добавить»</span>
  </div>

  <div id="ui-overlay">
    <div class="panel">

      <div class="wp-strip">
        <div class="wp-count-badge" id="wp-count">0 точек</div>
        <div class="wp-dots" id="wp-dots"></div>
      </div>

      <div class="actions">
        <button id="btn-add" class="btn btn-add" disabled>📍 Добавить точку</button>
        <button id="btn-route" class="btn btn-route" disabled>🗺️ Маршрут</button>
        <button id="btn-reset" class="btn btn-reset" title="Сброс">↺</button>
      </div>

      <div id="status"></div>
    </div>
  </div>

</body>

</html>
